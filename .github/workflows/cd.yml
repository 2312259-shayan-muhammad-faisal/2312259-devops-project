name: CD - Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to project directory (clone if first time)
            if [ ! -d "/home/${{ secrets.EC2_USER }}/2312259-devops-project" ]; then
              git clone https://github.com/${{ secrets.GITHUB_REPOSITORY_OWNER }}/2312259-devops-project.git /home/${{ secrets.EC2_USER }}/2312259-devops-project
            fi

            cd /home/${{ secrets.EC2_USER }}/2312259-devops-project

            # Pull latest code
            git pull origin main

            # Create .env file from GitHub Secrets
            cat > .env << EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            EOF

            # Pull new images and restart containers
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -f

            echo "Deployment complete!"
